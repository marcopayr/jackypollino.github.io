<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Site.Title }}</title>
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Party background ───────────────────────────────── */
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow-x: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Animated gradient base */
    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg,
        #ff006e, #fb5607, #ffbe0b, #3a86ff, #8338ec, #ff006e);
      background-size: 600% 600%;
      animation: gradientShift 8s ease infinite;
      z-index: 0;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Confetti pieces */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 14px;
      opacity: 0.85;
      border-radius: 2px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    /* Generate many confetti pieces via nth-child */
    .confetti-piece:nth-child(1)  { left:  2%; width:  8px; height: 12px; background:#ff006e; animation-duration:4.2s; animation-delay:0.0s; }
    .confetti-piece:nth-child(2)  { left:  7%; width: 12px; height:  8px; background:#ffbe0b; animation-duration:5.1s; animation-delay:0.3s; }
    .confetti-piece:nth-child(3)  { left: 13%; width:  9px; height: 13px; background:#3a86ff; animation-duration:3.8s; animation-delay:0.7s; }
    .confetti-piece:nth-child(4)  { left: 19%; width: 11px; height:  9px; background:#8338ec; animation-duration:4.7s; animation-delay:1.1s; }
    .confetti-piece:nth-child(5)  { left: 25%; width:  7px; height: 15px; background:#fb5607; animation-duration:5.5s; animation-delay:0.4s; }
    .confetti-piece:nth-child(6)  { left: 31%; width: 13px; height:  8px; background:#06d6a0; animation-duration:4.0s; animation-delay:1.5s; }
    .confetti-piece:nth-child(7)  { left: 37%; width:  8px; height: 11px; background:#ff006e; animation-duration:6.2s; animation-delay:0.2s; }
    .confetti-piece:nth-child(8)  { left: 43%; width: 10px; height: 14px; background:#ffbe0b; animation-duration:3.5s; animation-delay:0.9s; }
    .confetti-piece:nth-child(9)  { left: 49%; width: 12px; height:  9px; background:#3a86ff; animation-duration:5.8s; animation-delay:0.6s; }
    .confetti-piece:nth-child(10) { left: 55%; width:  8px; height: 13px; background:#8338ec; animation-duration:4.4s; animation-delay:1.8s; }
    .confetti-piece:nth-child(11) { left: 61%; width: 11px; height:  8px; background:#fb5607; animation-duration:3.9s; animation-delay:0.1s; }
    .confetti-piece:nth-child(12) { left: 67%; width:  9px; height: 12px; background:#06d6a0; animation-duration:5.3s; animation-delay:1.3s; }
    .confetti-piece:nth-child(13) { left: 73%; width: 13px; height:  9px; background:#ff006e; animation-duration:4.6s; animation-delay:0.5s; }
    .confetti-piece:nth-child(14) { left: 79%; width:  8px; height: 14px; background:#ffbe0b; animation-duration:6.0s; animation-delay:1.0s; }
    .confetti-piece:nth-child(15) { left: 85%; width: 10px; height: 10px; background:#3a86ff; animation-duration:3.7s; animation-delay:0.8s; border-radius:50%; }
    .confetti-piece:nth-child(16) { left: 91%; width: 12px; height:  8px; background:#8338ec; animation-duration:5.0s; animation-delay:1.6s; }
    .confetti-piece:nth-child(17) { left: 97%; width:  9px; height: 13px; background:#fb5607; animation-duration:4.3s; animation-delay:0.3s; }
    .confetti-piece:nth-child(18) { left:  4%; width: 11px; height: 11px; background:#06d6a0; animation-duration:5.7s; animation-delay:2.0s; border-radius:50%; }
    .confetti-piece:nth-child(19) { left: 16%; width:  8px; height:  9px; background:#ff006e; animation-duration:4.9s; animation-delay:1.4s; }
    .confetti-piece:nth-child(20) { left: 22%; width: 14px; height:  7px; background:#ffbe0b; animation-duration:3.6s; animation-delay:0.7s; }
    .confetti-piece:nth-child(21) { left: 34%; width:  9px; height: 12px; background:#3a86ff; animation-duration:5.4s; animation-delay:1.9s; }
    .confetti-piece:nth-child(22) { left: 46%; width: 12px; height: 10px; background:#8338ec; animation-duration:4.1s; animation-delay:0.4s; }
    .confetti-piece:nth-child(23) { left: 58%; width:  8px; height: 14px; background:#fb5607; animation-duration:5.9s; animation-delay:1.2s; }
    .confetti-piece:nth-child(24) { left: 70%; width: 10px; height:  8px; background:#06d6a0; animation-duration:3.4s; animation-delay:0.6s; }
    .confetti-piece:nth-child(25) { left: 82%; width: 11px; height: 11px; background:#ff006e; animation-duration:4.8s; animation-delay:1.7s; border-radius:50%; }
    .confetti-piece:nth-child(26) { left: 94%; width:  9px; height: 13px; background:#ffbe0b; animation-duration:5.2s; animation-delay:0.2s; }
    .confetti-piece:nth-child(27) { left: 10%; width: 13px; height:  8px; background:#3a86ff; animation-duration:4.5s; animation-delay:1.1s; }
    .confetti-piece:nth-child(28) { left: 28%; width:  8px; height: 10px; background:#8338ec; animation-duration:6.1s; animation-delay:0.9s; }
    .confetti-piece:nth-child(29) { left: 52%; width: 10px; height: 12px; background:#fb5607; animation-duration:3.3s; animation-delay:1.5s; }
    .confetti-piece:nth-child(30) { left: 76%; width: 12px; height:  9px; background:#06d6a0; animation-duration:4.0s; animation-delay:2.1s; }

    /* Balloons */
    .balloon {
      position: fixed;
      bottom: -80px;
      font-size: 3rem;
      animation: riseUp linear infinite;
      pointer-events: none;
      z-index: 1;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    }

    @keyframes riseUp {
      0%   { transform: translateY(0) rotate(-5deg); opacity: 1; }
      50%  { transform: translateY(-50vh) rotate(5deg); }
      100% { transform: translateY(-110vh) rotate(-5deg); opacity: 0; }
    }

    .balloon:nth-child(1) { left:  5%; animation-duration:12s; animation-delay:0s;  font-size:3.5rem; }
    .balloon:nth-child(2) { left: 20%; animation-duration:10s; animation-delay:3s;  font-size:2.8rem; }
    .balloon:nth-child(3) { left: 40%; animation-duration:14s; animation-delay:1s;  font-size:3.2rem; }
    .balloon:nth-child(4) { left: 60%; animation-duration:11s; animation-delay:5s;  font-size:3.8rem; }
    .balloon:nth-child(5) { left: 80%; animation-duration:13s; animation-delay:2s;  font-size:2.6rem; }
    .balloon:nth-child(6) { left: 93%; animation-duration: 9s; animation-delay:7s;  font-size:3.0rem; }

    /* ── Main card ──────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 10;
      max-width: 720px;
      width: 92%;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    /* ── Title / text field ─────────────────────────────── */
    .site-title {
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background: linear-gradient(90deg, #ff006e, #ffbe0b, #3a86ff, #8338ec);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: rgba(255,255,255,0.8);
      margin-bottom: 2.5rem;
    }

    /* .message-box {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      padding: 1rem 1.2rem;
      resize: vertical;
      min-height: 110px;
      margin-bottom: 2.5rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }

    .message-box::placeholder { color: rgba(255,255,255,0.45); }
    .message-box:focus { border-color: rgba(255,190,11,0.7); } */

    /* ── Countdown ──────────────────────────────────────── */
    .countdown-label {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.6);
      margin-bottom: 1rem;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .countdown-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 1rem 1.4rem;
      min-width: 90px;
    }

    .countdown-number {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      color: #ffbe0b;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(255,190,11,0.5);
    }

    .countdown-unit {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.55);
      margin-top: 0.35rem;
    }

    /* ── Expired state ──────────────────────────────────── */
    .party-time {
      display: none;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      background: linear-gradient(90deg, #ffbe0b, #ff006e, #8338ec, #3a86ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 1s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }
  </style>
</head>
<body>

  <!-- Animated gradient background -->
  <div class="bg"></div>

  <!-- Confetti -->
  <div class="confetti-container">
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
  </div>

  <!-- Balloons -->
  <div class="balloon">🎈</div>
  <div class="balloon">🎉</div>
  <div class="balloon">🎊</div>
  <div class="balloon">🎈</div>
  <div class="balloon">🥳</div>
  <div class="balloon">🎈</div>

  <!-- Main content card -->
  <div class="card">
    <h1 class="site-title">🎉 Jacky's Party 🎉</h1>
    <p class="subtitle">Something amazing is coming — mark your calendar!</p>

    <!-- <textarea class="message-box" placeholder="Leave a message for Jacky... 🥳"></textarea> -->

    <!-- <p class="countdown-label">Countdown to 30 June 2026</p> -->

    <div class="countdown" id="countdown">
      <div class="countdown-block">
        <span class="countdown-number" id="days">--</span>
        <span class="countdown-unit">Days</span>
      </div>
      <div class="countdown-block">
        <span class="countdown-number" id="hours">--</span>
        <span class="countdown-unit">Hours</span>
      </div>
      <div class="countdown-block">
        <span class="countdown-number" id="minutes">--</span>
        <span class="countdown-unit">Minutes</span>
      </div>
      <div class="countdown-block">
        <span class="countdown-number" id="seconds">--</span>
        <span class="countdown-unit">Seconds</span>
      </div>
    </div>

    <div class="party-time" id="partyTime">🎉 It's Party Time! 🎉</div>
  </div>

  <script>
    const deadline = new Date('2026-06-30T00:00:00').getTime();

    function pad(n) {
      return String(Math.floor(n)).padStart(2, '0');
    }

    function tick() {
      const now  = Date.now();
      const diff = deadline - now;

      if (diff <= 0) {
        document.getElementById('countdown').style.display = 'none';
        document.getElementById('partyTime').style.display = 'block';
        return;
      }

      const days    = diff / 86400000;
      const hours   = (diff % 86400000) / 3600000;
      const minutes = (diff % 3600000)  / 60000;
      const seconds = (diff % 60000)    / 1000;

      document.getElementById('days').textContent    = pad(days);
      document.getElementById('hours').textContent   = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
